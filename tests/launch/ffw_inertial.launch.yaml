launch:
- set_env:
    name: 'QT_FONT_DPI'
    value: '120'
- node:
    pkg: 'robot_model_server_ros'
    exec: 'robot_model_server_ros'
    output: 'screen'
    param:
    - name: 'model.description'
      type: 'str'
      value: "$(command 'cat $(find-pkg-share ffw_description)/urdf/ffw_bg2_rev4_follower/ffw_bg2_follower.urdf')"
    - name: 'visualization.inertia'
      value: true
    - name: 'inertia.cumulative'
      value: true
- node:
    pkg: 'joint_state_publisher_gui'
    exec: 'joint_state_publisher_gui'
    output: 'screen'
- node:
    pkg: 'rviz2'
    exec: 'rviz2'
    output: 'screen'
    args: '-d $(find-pkg-share robot_model_server_tests)/rviz/ffw_inertial.rviz'
    on_exit: shutdown